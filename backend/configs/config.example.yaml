server:
  host: "0.0.0.0"
  port: 8080

database:
  driver: sqlite
  dsn: ../memoryflow-data/data/memoryflow.db

storage:
  upload_dir: ../memoryflow-data/uploads

model:
  base_url: "https://xxx/v1"
  api_key: "你本地的key"
  model_name: "xxx"

embedding:
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
  api_key: "xxx"
  model_name: "你的_embedding_模型名"
  dim: 1024

milvus:
  address: "localhost:19530"
  collection: "memoryflow_memories"

github:
  # Fine-grained GitHub token 建议只读权限：
  # - Contents: Read-only，用于 commits
  # - Issues: Read-only，用于 issues
  # - Pull requests: Read-only，用于 PR
  # - Metadata: Read-only，GitHub 默认需要
  token: "your github token"
  default_limit: 10
  default_days: 7
